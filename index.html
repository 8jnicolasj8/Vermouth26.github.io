<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria Vermouth26</title>

<style>
/* ========================================
   CONFIGURACIÓN PERSONALIZABLE
======================================== */

/* CAMBIÁ ESTA URL POR TU IMAGEN DE FONDO */
:root {
    --bg-image: url('Imagenes/Vermouth26.png');
}

/* ========================================
   ESTILOS GENERALES
======================================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;

    /* 🔥 MEJOR PARA CELULAR */
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 15px;
}

/* 👇 Evita bugs de altura en celular */
html, body {
    height: 100%;
}

.container {
    width: 100%;
    max-width: 1100px;
}

/* ========================================
   GRILLA
======================================== */

.image-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    justify-items: center;
}

/* ========================================
   TARJETAS
======================================== */

.grid-item {
    width: 100%;
    max-width: 300px;
    aspect-ratio: 1;
    border-radius: 18px;
    overflow: hidden;

    box-shadow: 0 10px 25px rgba(0,0,0,0.4);

    /* 🔥 IMPORTANTE PARA CELULAR */
    -webkit-tap-highlight-color: transparent;
}

/* EFECTO (solo en PC) */
@media (hover: hover) {
    .grid-item {
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .grid-item:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .grid-item img {
        transition: transform 0.3s;
    }

    .grid-item:hover img {
        transform: scale(1.1);
    }
}

/* EFECTO AL TOCAR EN CELULAR */
.grid-item:active {
    transform: scale(0.97);
}

/* ========================================
   IMÁGENES
======================================== */

.grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ========================================
   IMAGEN CENTRAL
======================================== */

.center-image {
    grid-column: 1 / -1;
    max-width: 400px;
}

/* ========================================
   RESPONSIVE
======================================== */

@media (max-width: 600px) {
    .image-grid {
        grid-template-columns: 1fr;
    }

    .center-image {
        max-width: 280px;
    }

    .grid-item {
        max-width: 260px;
    }
}

/* ========================================
   ANIMACIÓN SUAVEE
======================================== */

.grid-item {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.6s ease forwards;
}

.grid-item:nth-child(1){animation-delay:.1s;}
.grid-item:nth-child(2){animation-delay:.2s;}
.grid-item:nth-child(3){animation-delay:.3s;}
.grid-item:nth-child(4){animation-delay:.4s;}
.grid-item:nth-child(5){animation-delay:.5s;}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="image-grid">

        <!-- CAMBIÁ LAS IMÁGENES ACÁ -->

        <a href="Vermouth26-1ro.html" class="grid-item">
            <img src="Imagenes/Vermouth26-1ro.png">
        </a>

        <a href="Vermouth26-2do.html" class="grid-item">
            <img src="Imagenes/Vermouth26-2do.png">
        </a>

        <a href="Vermouth26-3ro.html" class="grid-item">
            <img src="Imagenes/Vermouth26-3ro.png">
        </a>

        <a href="Vermouth26-4to.html" class="grid-item">
            <img src="Imagenes/Vermouth26-4to.png">
        </a>

        <a href="Vermouth26-6to.html" class="grid-item center-image">
            <img src="Imagenes/Vermouth26-6to.png">
        </a>

    </div>
</div>

</body>
</html>
